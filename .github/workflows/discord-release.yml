name: Notify Discord on Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send release to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name || 'Test Release' }}
          RELEASE_BODY: ${{ github.event.release.body || 'Test body content.' }}
          RELEASE_URL: ${{ github.event.release.html_url || 'https://github.com' }}
        run: |
          BODY=$(echo "$RELEASE_BODY" | head -c 2000)

          JSON=$(jq -n \
            --arg title "$RELEASE_NAME" \
            --arg desc "$BODY" \
            --arg url "$RELEASE_URL" \
            '{
              username: "Ideon Releases",
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 5814783
              }]
            }')

          if [ "${ACT}" = "true" ]; then
            echo "Running inside act — skipping Discord webhook."
            echo "Payload:"
            echo "$JSON"
          else
            curl -H "Content-Type: application/json" \
                 -d "$JSON" \
                 "$WEBHOOK_URL"
          fi
