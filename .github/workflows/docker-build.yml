name: Docker Build (main)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tag on commit
        id: check
        run: |
          git fetch --tags --force
          if git tag --points-at "$GITHUB_SHA" | grep -q .; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build-amd64:
    needs: check-tag
    if: needs.check-tag.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64
          cache-from: type=gha,scope=linux-amd64
          cache-to: type=gha,mode=max,scope=linux-amd64

  build-arm64:
    needs: check-tag
    if: needs.check-tag.outputs.skip == 'false'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          cache-from: type=gha,scope=linux-arm64
          cache-to: type=gha,mode=max,scope=linux-arm64

  merge-manifest:
    needs: [build-amd64, build-arm64]
    if: needs.build-amd64.result == 'success' && needs.build-arm64.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64

      - name: Delete intermediate arch-specific images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PACKAGE="${{ github.event.repository.name }}"
          OWNER_TYPE=$(gh api "users/${OWNER}" --jq '.type')
          [ "$OWNER_TYPE" = "Organization" ] && BASE="orgs/${OWNER}" || BASE="users/${OWNER}"
          for TAG in latest-amd64 latest-arm64; do
            VERSION_ID=$(gh api "${BASE}/packages/container/${PACKAGE}/versions" \
              --paginate \
              --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id" | head -1)
            if [ -n "$VERSION_ID" ]; then
              gh api --method DELETE "${BASE}/packages/container/${PACKAGE}/versions/${VERSION_ID}"
              echo "Deleted ${TAG} (id: ${VERSION_ID})"
            else
              echo "Warning: tag ${TAG} not found, skipping"
            fi
          done
